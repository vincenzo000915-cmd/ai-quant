server {
    server_name ai-quant.medias-ai.cloud;

    # 上传 / 接收数据 body limit（USDT 订阅 / AI prompt 体积小，10MB 足够）
    client_max_body_size 10M;

    # 大 prompt LLM 调用可能慢（claude_cli 30-90s）
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;

    # 标准反代到 Flask (gunicorn 5005)
    location / {
        proxy_pass http://127.0.0.1:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (虽然 OKX WS 是前端直连 OKX，但留着不影响)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 健康检查 endpoint 不写 access log（减少噪音）
    location /api/auth/check {
        proxy_pass http://127.0.0.1:5005;
        proxy_set_header Host $host;
        access_log off;
    }

    # 静态资源 (frontend_build) 长缓存 — Flask 已 serve 但加 nginx 缓存头更优
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$ {
        proxy_pass http://127.0.0.1:5005;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ai-quant.medias-ai.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ai-quant.medias-ai.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = ai-quant.medias-ai.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name ai-quant.medias-ai.cloud;
    return 404; # managed by Certbot


}